<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Learning Trajectory Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- ================= CSS ================= -->
  <style>
    :root {
      /* カラーパレット (白背景ベース) */
      --c-bg: #ffffff;
      --c-surface: #ffffff;
      --c-surface-hover: #f8fafc;
      --c-border: #e2e8f0;
      --c-text-main: #0f172a;
      --c-text-sub: #64748b;
      
      --c-primary: #3b82f6;
      --c-primary-hover: #2563eb;
      --c-primary-light: #eff6ff;
      
      --c-success: #10b981;
      --c-success-bg: #ecfdf5;
      --c-danger: #ef4444;
      --c-danger-bg: #fef2f2;
      --c-warning: #f59e0b;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', system-ui, -apple-system, sans-serif;
      background-color: var(--c-bg);
      color: var(--c-text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Header & Navigation --- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--c-border);
      flex-wrap: wrap;
      gap: 12px;
    }

    .topbar h1 {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--c-primary);
      letter-spacing: -0.025em;
    }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--c-text-sub);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .nav-btn:hover {
      background: var(--c-surface-hover);
      color: var(--c-text-main);
    }

    .nav-btn.active {
      background: var(--c-primary-light);
      color: var(--c-primary);
      border-color: #bfdbfe;
    }

    /* --- Layout --- */
    #app {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    [hidden] { display: none !important; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- UI Components --- */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--c-text-sub);
      cursor: pointer;
      transition: var(--transition);
      user-select: none;
    }
    .chip:hover { background: var(--c-surface-hover); }
    .chip input:checked + span { color: var(--c-primary); font-weight: 700; }
    .chip:has(input:checked) { border-color: var(--c-primary); background: var(--c-primary-light); }
    .chip input { display: none; }

    .bookmark-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: #cbd5e1;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 50%;
    }
    .bookmark-btn:hover { background: #fef3c7; color: var(--c-warning); transform: scale(1.1); }
    .bookmark-btn.active { color: var(--c-warning); }

    /* --- Dashboard --- */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .stat-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    .stat-card-title { font-size: 0.95rem; color: var(--c-text-sub); font-weight: 600; margin-bottom: 8px; }
    .stat-card-value { font-size: 2.5rem; font-weight: 900; color: var(--c-text-main); }
    .stat-card-sub { font-size: 0.85rem; color: var(--c-text-sub); margin-top: 4px; }

    .section-title {
      font-size: 1.25rem;
      font-weight: 800;
      margin: 0 0 20px;
      color: var(--c-text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .cat-stat {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 12px;
    }
    .cat-stat-head { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 8px; }
    .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-bottom: 6px; }
    .progress-fill { height: 100%; background: var(--c-primary); transition: width 0.5s ease-out; }
    .cat-stat-meta { font-size: 0.8rem; color: var(--c-text-sub); text-align: right; }

    .play-modes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    .play-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: var(--c-surface);
      border: 2px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 20px;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 700;
      color: var(--c-text-main);
    }
    .play-btn:hover { border-color: var(--c-primary); background: var(--c-surface-hover); transform: translateY(-2px); }
    .play-btn-icon { font-size: 2rem; }

    /* --- List View Filters --- */
    .filters {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 32px;
      box-shadow: var(--shadow-sm);
    }
    .filters-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
    .filters-item { display: flex; flex-direction: column; gap: 6px; flex: 1 1 200px; }
    .filters-label { font-size: 0.85rem; font-weight: 500; color: var(--c-text-sub); }
    .filters-select, .filters-input {
      width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--c-border);
      font-family: inherit; font-size: 0.95rem; transition: var(--transition);
    }
    .filters-select:focus, .filters-input:focus { outline: none; border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
    .filters-select:disabled { background: var(--c-surface-hover); opacity: 0.7; }

    /* --- List View Cards --- */
    .quiz-list { display: grid; gap: 16px; }
    .quiz-card {
      display: flex; flex-direction: column; gap: 12px; padding: 20px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius-md); text-align: left; cursor: pointer;
      transition: var(--transition); position: relative;
    }
    .quiz-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--c-primary); }
    .quiz-card-title { font-size: 1.05rem; font-weight: 500; line-height: 1.5; padding-right: 40px;}
    .quiz-card-meta { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--c-text-sub); }
    .quiz-card .bookmark-btn { position: absolute; top: 16px; right: 16px; }

    .badge { padding: 4px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .badge-gray { background: #f1f5f9; color: #475569; }
    .badge-green { background: var(--c-success-bg); color: var(--c-success); }
    .badge-red { background: var(--c-danger-bg); color: var(--c-danger); }

    /* --- Quiz View --- */
    .playlist-banner {
      background: var(--c-primary);
      color: white;
      text-align: center;
      padding: 8px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .question-meta { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    .question-meta-tags { display: flex; gap: 16px; font-size: 0.9rem; color: var(--c-text-sub); }
    .question-meta-tags > div { display: flex; align-items: center; gap: 6px; }

    .question-box {
      background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius-lg);
      padding: 32px; margin-bottom: 32px; box-shadow: var(--shadow-sm); font-size: 1.15rem; font-weight: 500; line-height: 1.7;
    }
    .choices { display: flex; flex-direction: column; gap: 16px; }
    .choice { background: var(--c-surface); border: 2px solid var(--c-border); border-radius: var(--radius-md); transition: var(--transition); overflow: hidden; }
    .choice:hover:not(.disabled) { border-color: var(--c-primary); background: var(--c-surface-hover); }
    .choice-main { display: flex; align-items: flex-start; gap: 16px; padding: 20px; cursor: pointer; }
    .choice.disabled .choice-main { cursor: default; }

    .choice-input-wrapper {
      flex-shrink: 0; width: 24px; height: 24px; border: 2px solid var(--c-border); border-radius: 6px;
      display: flex; align-items: center; justify-content: center; transition: var(--transition); margin-top: 2px;
    }
    .choice-input { display: none; }
    .choice-input:checked + .choice-input-wrapper { background: var(--c-primary); border-color: var(--c-primary); }
    .choice-input:checked + .choice-input-wrapper::after { content: ""; width: 10px; height: 10px; background: white; border-radius: 2px; }
    .choice:has(.choice-input:checked) { border-color: var(--c-primary); background: var(--c-primary-light); }
    .choice-text { font-size: 1rem; line-height: 1.5; padding-top: 2px; }

    .choice.is-correct { border-color: var(--c-success); background: var(--c-success-bg); }
    .choice.is-correct .choice-input-wrapper { background: var(--c-success); border-color: var(--c-success); }
    .choice.is-wrong { border-color: var(--c-danger); background: var(--c-danger-bg); }
    
    .choice-info { padding: 0 20px 20px 56px; }
    .choice-overview { font-weight: 700; margin-bottom: 12px; }
    .choice.is-correct .choice-overview { color: var(--c-success); }
    .choice.is-wrong .choice-overview { color: var(--c-danger); }

    .choice-toggle-detail {
      display: inline-flex; align-items: center; gap: 8px; background: none; border: none; color: var(--c-text-sub);
      font-size: 0.9rem; font-weight: 500; cursor: pointer; padding: 8px 12px; border-radius: var(--radius-sm); transition: var(--transition); margin-left: -12px;
    }
    .choice-toggle-detail:hover:not(:disabled) { background: var(--c-surface-hover); color: var(--c-text-main); }
    .choice-toggle-detail.is-open svg { transform: rotate(180deg); }
    .choice-detail { margin-top: 12px; padding: 16px; background: rgba(0,0,0,0.03); border-radius: var(--radius-sm); font-size: 0.95rem; border-left: 3px solid var(--c-primary); }
    .choice-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 12px; font-size: 0.9rem; color: var(--c-primary); text-decoration: none; font-weight: 500; }
    .choice-link:hover { text-decoration: underline; }

    /* --- Actions --- */
    .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--c-border); }
    .btn-primary { background: var(--c-primary); color: #ffffff; border: none; padding: 14px 32px; border-radius: 999px; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39); transition: var(--transition); }
    .btn-primary:hover:not(:disabled) { background: var(--c-primary-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.23); }
    .btn-secondary { background: #ffffff; color: var(--c-text-main); border: 1px solid var(--c-border); padding: 12px 24px; border-radius: 999px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
    .btn-secondary:hover:not(:disabled) { background: var(--c-surface-hover); border-color: #cbd5e1; }
    .btn-danger { background: var(--c-danger-bg); color: var(--c-danger); border: 1px solid #fca5a5; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: var(--transition); }
    .btn-danger:hover { background: #fee2e2; border-color: var(--c-danger); }
    button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none !important; }

    .result-banner { margin-top: 24px; padding: 20px; border-radius: var(--radius-md); text-align: center; font-size: 1.25rem; font-weight: 700; animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .result-banner.ok { background: var(--c-success-bg); color: var(--c-success); border: 2px solid var(--c-success); }
    .result-banner.ng { background: var(--c-danger-bg); color: var(--c-danger); border: 2px solid var(--c-danger); }
    
    .empty { text-align: center; padding: 40px; color: var(--c-text-sub); background: var(--c-surface-hover); border-radius: var(--radius-md); border: 1px dashed var(--c-border); }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>LT Quiz</h1>
    <nav class="nav-links">
      <button id="navDashboard" class="nav-btn" onclick="setRoute(null, 'dashboard')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px; margin-top: -2px;"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        成績・演習
      </button>
      <button id="navList" class="nav-btn active" onclick="setRoute(null, 'list')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px; margin-top: -2px;"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        問題一覧
      </button>
    </nav>
  </header>

  <main id="app">
    <div id="status" style="text-align: center; margin-bottom: 20px; color: #64748b;"></div>

    <!-- ================= DASHBOARD VIEW ================= -->
    <section id="view-dashboard" class="fade-in" hidden>
      <h2 class="section-title">学習ダッシュボード</h2>
      
      <div class="dashboard-grid">
        <div class="stat-card">
          <div class="stat-card-title">全体の正答率</div>
          <div id="db-accuracy" class="stat-card-value">0%</div>
          <div id="db-correct-count" class="stat-card-sub">正解 0 / 回答 0</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title">学習の進捗度</div>
          <div id="db-progress" class="stat-card-value">0%</div>
          <div id="db-answered-count" class="stat-card-sub">回答 0 / 全 0 問</div>
        </div>
      </div>

      <h2 class="section-title">ランダム演習モード</h2>
      <div class="play-modes">
        <button class="play-btn" onclick="startRandomPlay('unanswered')">
          <div class="play-btn-icon">🆕</div>
          未回答から10問
        </button>
        <button class="play-btn" onclick="startRandomPlay('weak')">
          <div class="play-btn-icon">🔥</div>
          不正解問題から10問
        </button>
        <button class="play-btn" onclick="startRandomPlay('bookmark')">
          <div class="play-btn-icon">⭐</div>
          お気に入りから10問
        </button>
      </div>

      <h2 class="section-title">カテゴリ別 正答率</h2>
      <div id="db-cat-stats" style="margin-bottom: 40px;">
        <!-- カテゴリごとの進捗がJSで生成されます -->
      </div>

      <h2 class="section-title">設定</h2>
      <div style="background: var(--c-danger-bg); padding: 20px; border-radius: var(--radius-md); border: 1px solid #fca5a5;">
        <p style="margin-bottom: 12px; font-weight: 500; color: var(--c-danger);">デバイスに保存されている学習履歴とお気に入りをすべて初期化します。</p>
        <button class="btn-danger" onclick="resetData()">学習データをリセット</button>
      </div>
    </section>

    <!-- ================= LIST VIEW ================= -->
    <section id="view-list" class="fade-in">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
        <h2 class="section-title" style="margin: 0;">問題一覧</h2>
        <p style="font-size: 0.85rem; color: var(--c-text-sub);">クリックして問題に挑戦</p>
      </div>

      <section class="filters" aria-label="フィルタ">
        <div class="filters-row">
          <label class="filters-item">
            <span class="filters-label">親カテゴリ</span>
            <select id="parentFilter" class="filters-select"><option value="">すべて</option></select>
          </label>
          <label class="filters-item">
            <span class="filters-label">表示グループ</span>
            <select id="groupMode" class="filters-select">
              <option value="cat-parent">カテゴリ</option>
              <option value="session">開催期（出典）</option>
            </select>
          </label>
          <label class="filters-item" style="flex: 2 1 300px;">
            <span class="filters-label">キーワード検索</span>
            <input id="searchInput" class="filters-input" type="search" placeholder="問題文 / ID / 出典で検索" />
          </label>
        </div>
        <div class="filters-row" style="margin-top: 20px; gap: 12px;">
          <label class="chip"><input id="onlyUnanswered" type="checkbox" /><span>未回答のみ</span></label>
          <label class="chip"><input id="onlyIncorrect" type="checkbox" /><span>不正解のみ</span></label>
          <label class="chip"><input id="onlyBookmark" type="checkbox" /><span>お気に入り(★)</span></label>
        </div>
      </section>

      <div id="quizList" class="quiz-list"></div>
    </section>

    <!-- ================= QUIZ VIEW ================= -->
    <section id="view-quiz" class="fade-in" hidden>
      <div id="playlistBanner" class="playlist-banner" hidden>
        ランダム演習モード: <span id="playlistProgress"></span>
      </div>

      <div class="question-meta">
        <div class="question-meta-tags">
          <div id="qid" title="問題ID"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18"/></svg><span></span></div>
          <div id="qcategory" title="カテゴリ"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span></span></div>
          <div id="qsource" title="出典"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg><span></span></div>
        </div>
        <button id="quizBookmarkBtn" class="bookmark-btn" title="お気に入りに追加">★</button>
      </div>

      <div id="question" class="question-box"></div>
      <div id="result" class="result"></div>
      <div id="choices" class="choices"></div>

      <template id="choice-template">
        <div class="choice">
          <label class="choice-main">
            <input type="checkbox" class="choice-input" />
            <div class="choice-input-wrapper"></div>
            <span class="choice-text"></span>
          </label>
          <div class="choice-info" hidden>
            <div class="choice-overview" hidden></div>
            <button type="button" class="choice-toggle-detail" disabled>
              <span>解説を読む</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <div class="choice-detail" hidden>
              <div class="choice-detail-content"></div>
              <a href="" class="choice-link" target="_blank" rel="noopener noreferrer">参考リンクを開く</a>
            </div>
          </div>
        </div>
      </template>

      <div class="actions">
        <button id="prevBtn" type="button" class="btn-secondary">前の問題</button>
        <button id="submitBtn" type="button" class="btn-primary">回答を決定する</button>
        <button id="nextBtn" type="button" class="btn-secondary">次の問題</button>
      </div>
    </section>
  </main>

  <!-- ================= JS ================= -->
  <script>
    // --- Data Mock ---
    const FALLBACK_QUESTIONS = [
      {
        "id": "ap-tech-vcs-distributed",
        "source": "令和6年秋期　問19",
        "question": "分散開発環境において、各開発者のローカル環境に全履歴を含んだ中央リポジトリの完全な複製を保持し、中央リポジトリにアクセスできない場合でも履歴の調査や変更の記録を可能にするバージョン管理ツールはどれか。",
        "choices": [
          { "text": "Apache Subversion", "overview": "誤り。集中型。", "detail": "Apache Subversionは中央リポジトリを前提とした集中型のバージョン管理システムであり、各開発者が完全な履歴を持つ分散型の仕組みではない。" },
          { "text": "CVS", "overview": "誤り。集中型。", "detail": "CVSは共有サーバ上のリポジトリを利用する集中型のバージョン管理ツールである。" },
          { "text": "Git", "overview": "正しい。分散型。", "detail": "Gitは分散型バージョン管理システムであり、各開発者が中央リポジトリの完全な複製をローカルに保持する。" },
          { "text": "RCS", "overview": "誤り。初期の仕組み。", "detail": "RCSはファイル単位で変更履歴を管理する初期のバージョン管理システムである。" }
        ],
        "correct_indices": [2],
        "category": "テクノロジ系 / ソフトウェア"
      }
    ];

    // --- State & Core ---
    const $ = (id) => document.getElementById(id);

    let QUESTIONS = [];
    let CURRENT_ID = null;

    // Local Storage Keys
    const LOG_KEY = "ltQuizLogs_v2";
    const BOOKMARK_KEY = "ltQuizBookmarks";

    const SESSION_RESULTS = new Map();
    let bookmarks = new Set();

    // ランダム演習モード用State
    let playList = [];
    let playListIndex = -1;

    // --- Loaders ---
    async function loadQuestions() {
      try {
        const res = await fetch("./questions.json", { cache: "no-cache", headers: { Accept: "application/json" } });
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data)) return data;
        }
      } catch (e) { console.warn("questions.jsonの読み込みに失敗しました。モックを使用します。"); }
      return FALLBACK_QUESTIONS;
    }

    function loadLogs() {
      try { return JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } 
      catch { return []; }
    }
    function saveLogs(logs) { localStorage.setItem(LOG_KEY, JSON.stringify(logs)); }
    function addLog(entry) {
      const logs = loadLogs();
      logs.push(entry);
      if (logs.length > 5000) logs.splice(0, logs.length - 5000);
      saveLogs(logs);
    }
    function latestResultById(logs) {
      const m = new Map();
      for (const e of logs) {
        const prev = m.get(e.id);
        if (!prev || (typeof e.t === "number" && e.t > prev.t)) m.set(e.id, e);
      }
      return m;
    }

    function loadBookmarks() {
      try { bookmarks = new Set(JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]')); }
      catch { bookmarks = new Set(); }
    }
    function toggleBookmark(id) {
      if(bookmarks.has(id)) bookmarks.delete(id);
      else bookmarks.add(id);
      localStorage.setItem(BOOKMARK_KEY, JSON.stringify([...bookmarks]));
      renderList(); // リストの★更新
    }

    // --- Routing ---
    function setRoute(id = null, view = null) {
      const url = new URL(window.location.href);
      url.searchParams.delete("id");
      url.searchParams.delete("view");
      
      if (id) url.searchParams.set("id", id);
      else if (view) url.searchParams.set("view", view);
      
      history.pushState({}, "", url.toString());
      syncViewFromUrl();
    }

    function getQueryParam(name) { return new URL(window.location.href).searchParams.get(name); }

    function syncViewFromUrl() {
      const id = getQueryParam("id");
      const view = getQueryParam("view");

      $('view-list').hidden = true;
      $('view-quiz').hidden = true;
      $('view-dashboard').hidden = true;

      $('navList').classList.remove('active');
      $('navDashboard').classList.remove('active');

      if (id) {
        $('view-quiz').hidden = false;
        CURRENT_ID = String(id);
        const q = QUESTIONS.find((x) => String(x.id) === CURRENT_ID);
        if (q) renderQuestion(q);
        else $('question').textContent = "問題が見つかりません。";
        window.scrollTo(0, 0);
      } else if (view === 'dashboard') {
        $('view-dashboard').hidden = false;
        $('navDashboard').classList.add('active');
        playList = []; // モードリセット
        renderDashboard();
      } else {
        $('view-list').hidden = false;
        $('navList').classList.add('active');
        playList = []; // モードリセット
        renderList();
      }
    }
    window.addEventListener("popstate", syncViewFromUrl);

    // --- Helpers ---
    function splitCategory(c) {
      const parts = String(c || "未分類").split("/").map(s => s.trim()).filter(Boolean);
      return { parent: parts[0], sub: parts.slice(1).join(" / ") || "未分類" };
    }
    function qCategoryParent(q) { return splitCategory(q.category).parent; }
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
    const uniqSorted = (arr) => Array.from(new Set(arr)).sort((a, b) => a - b);
    const arraysEqual = (a, b) => a.length === b.length && a.every((v, i) => v === b[i]);
    
    // 配列のシャッフル
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // --- Dashboard ---
    function renderDashboard() {
      const logs = loadLogs();
      const latest = latestResultById(logs);
      
      const totalQ = QUESTIONS.length;
      const ansCount = latest.size;
      const correctCount = [...latest.values()].filter(r => r.isCorrect).length;
      
      const accuracy = ansCount > 0 ? Math.round((correctCount / ansCount) * 100) : 0;
      const progress = totalQ > 0 ? Math.round((ansCount / totalQ) * 100) : 0;
      
      $('db-accuracy').textContent = `${accuracy}%`;
      $('db-correct-count').textContent = `正解 ${correctCount} / 回答 ${ansCount}`;
      $('db-progress').textContent = `${progress}%`;
      $('db-answered-count').textContent = `回答 ${ansCount} / 全 ${totalQ} 問`;

      // カテゴリ別集計
      const catStats = new Map();
      QUESTIONS.forEach(q => {
        const p = qCategoryParent(q);
        if(!catStats.has(p)) catStats.set(p, { total: 0, correct: 0, answered: 0 });
        catStats.get(p).total++;
        const r = latest.get(q.id);
        if(r) {
          catStats.get(p).answered++;
          if(r.isCorrect) catStats.get(p).correct++;
        }
      });

      const catHtml = Array.from(catStats.entries()).sort((a,b) => b[1].total - a[1].total).map(([cat, stat]) => {
        const acc = stat.answered > 0 ? Math.round((stat.correct / stat.answered) * 100) : 0;
        return `
          <div class="cat-stat">
            <div class="cat-stat-head"><span>${escapeHtml(cat)}</span> <span>${acc}%</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width: ${acc}%"></div></div>
            <div class="cat-stat-meta">${stat.answered} / ${stat.total} 問 完了</div>
          </div>
        `;
      }).join('');
      $('db-cat-stats').innerHTML = catHtml || '<p style="color:var(--c-text-sub)">データがありません</p>';
    }

    function resetData() {
      if(confirm("本当に学習履歴とお気に入りをすべて削除しますか？\nこの操作は元に戻せません。")) {
        localStorage.removeItem(LOG_KEY);
        localStorage.removeItem(BOOKMARK_KEY);
        bookmarks.clear();
        SESSION_RESULTS.clear();
        alert("データをリセットしました。");
        renderDashboard();
      }
    }

    // ランダム演習開始
    function startRandomPlay(mode) {
      const logs = loadLogs();
      const latest = latestResultById(logs);
      let targetIds = [];
      
      if (mode === 'unanswered') {
        targetIds = QUESTIONS.filter(q => !latest.has(q.id)).map(q => q.id);
      } else if (mode === 'weak') {
        // 直近の回答が不正解のもの
        targetIds = QUESTIONS.filter(q => latest.has(q.id) && !latest.get(q.id).isCorrect).map(q => q.id);
      } else if (mode === 'bookmark') {
        targetIds = [...bookmarks];
      }
      
      if (targetIds.length === 0) {
        alert("条件に一致する問題がありませんでした。");
        return;
      }
      
      playList = shuffle(targetIds).slice(0, 10); // 最大10問
      playListIndex = 0;
      setRoute(playList[0]);
    }

    // --- List View ---
    function setupFilters() {
      const pSel = $("parentFilter");
      const parents = Array.from(new Set(QUESTIONS.map(qCategoryParent))).sort();
      pSel.innerHTML = `<option value="">すべて</option>` + parents.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join("");
      
      pSel.onchange = renderList;
      $("groupMode").onchange = renderList;
      $("searchInput").addEventListener("input", renderList);
      $("onlyUnanswered").addEventListener("change", renderList);
      $("onlyIncorrect").addEventListener("change", renderList);
      $("onlyBookmark").addEventListener("change", renderList);
    }

    function renderList() {
      const logs = loadLogs();
      const latest = latestResultById(logs);
      const listEl = $("quizList");
      listEl.innerHTML = "";

      const qSearch = String($("searchInput").value || "").trim().toLowerCase();
      const mode = String($("groupMode").value);
      const parent = String($("parentFilter").value || "").trim();
      
      const onlyU = $("onlyUnanswered").checked;
      const onlyI = $("onlyIncorrect").checked;
      const onlyB = $("onlyBookmark").checked;

      const filtered = QUESTIONS.filter(q => {
        if (mode === "cat-parent" && parent && qCategoryParent(q) !== parent) return false;
        if (qSearch && !`${q.id} ${q.question} ${q.source||""}`.toLowerCase().includes(qSearch)) return false;
        
        const r = latest.get(q.id);
        if (onlyU && r) return false;
        if (onlyI && (!r || r.isCorrect)) return false;
        if (onlyB && !bookmarks.has(q.id)) return false;
        return true;
      });

      if (filtered.length === 0) {
        listEl.innerHTML = `<div class="empty">条件に一致する問題がありません。</div>`;
        return;
      }

      const groups = new Map();
      filtered.forEach(q => {
        const key = mode === "cat-parent" ? qCategoryParent(q) : (q.source ? q.source.split('問')[0].trim() : "不明");
        if(!groups.has(key)) groups.set(key, []);
        groups.get(key).push(q);
      });

      let gIdx = 0;
      for (const [key, arr] of groups.entries()) {
        const sec = document.createElement("section");
        sec.innerHTML = `<h3 class="section-title" style="margin-top:24px; font-size:1.1rem">${escapeHtml(key)} <span style="font-size:0.9rem; color:var(--c-text-sub); font-weight:normal">(${arr.length}問)</span></h3>`;
        const grid = document.createElement("div");
        grid.className = "quiz-list";
        
        arr.forEach((q) => {
          gIdx++;
          const card = document.createElement("div");
          card.className = "quiz-card fade-in";
          card.style.animationDelay = `${Math.min(gIdx * 0.02, 0.3)}s`;
          
          const r = latest.get(q.id);
          const badge = !r ? `<span class="badge badge-gray">未回答</span>` : (r.isCorrect ? `<span class="badge badge-green">正解</span>` : `<span class="badge badge-red">不正解</span>`);
          const starClass = bookmarks.has(q.id) ? "active" : "";
          
          card.innerHTML = `
            <div class="quiz-card-title">${q.question.substring(0, 60)}...</div>
            <div class="quiz-card-meta">${badge}<span>ID: ${escapeHtml(q.id)}</span></div>
            <button class="bookmark-btn ${starClass}" onclick="event.stopPropagation(); toggleBookmark('${q.id}')">★</button>
          `;
          card.onclick = () => setRoute(q.id);
          grid.appendChild(card);
        });
        sec.appendChild(grid);
        listEl.appendChild(sec);
      }
    }

    // --- Quiz View ---
    function renderQuestion(q) {
      // プレイリストモードの表示制御
      const banner = $('playlistBanner');
      if (playList.length > 0) {
        banner.hidden = false;
        $('playlistProgress').textContent = `${playListIndex + 1} / ${playList.length} 問目`;
      } else {
        banner.hidden = true;
      }

      $("qid").querySelector("span").textContent = q.id;
      $("qcategory").querySelector("span").textContent = q.category || "未分類";
      $("qsource").querySelector("span").textContent = q.source || "不明";
      $("question").textContent = q.question;
      
      const bBtn = $("quizBookmarkBtn");
      bBtn.className = `bookmark-btn ${bookmarks.has(q.id) ? 'active' : ''}`;
      bBtn.onclick = () => { toggleBookmark(q.id); bBtn.className = `bookmark-btn ${bookmarks.has(q.id) ? 'active' : ''}`; };

      const resultEl = $("result");
      resultEl.innerHTML = "";
      
      const choicesEl = $("choices");
      choicesEl.innerHTML = "";
      const tpl = $("choice-template");

      const sessionRes = SESSION_RESULTS.get(String(q.id));
      const selected = new Set();

      for (let i = 0; i < q.choices.length; i++) {
        const c = q.choices[i];
        const node = tpl.content.firstElementChild.cloneNode(true);

        const input = node.querySelector(".choice-input");
        node.querySelector(".choice-text").textContent = c.text || "";
        input.disabled = !!sessionRes;

        if (sessionRes) {
          input.checked = sessionRes.selected.includes(i);
          node.classList.add("disabled");
          node.querySelector(".choice-info").hidden = false;
          
          if (q.correct.includes(i)) node.classList.add("is-correct");
          else if (input.checked) node.classList.add("is-wrong");
          
          if (c.overview) {
            const ov = node.querySelector(".choice-overview");
            ov.hidden = false; ov.textContent = c.overview;
          }
        }

        node.querySelector(".choice-detail-content").textContent = c.detail || "";
        const link = node.querySelector(".choice-link");
        if (c.link) link.href = c.link; else link.hidden = true;

        const btn = node.querySelector(".choice-toggle-detail");
        const detail = node.querySelector(".choice-detail");
        btn.disabled = !sessionRes;
        btn.onclick = () => {
          const isOpen = !detail.hidden;
          detail.hidden = isOpen;
          btn.classList.toggle("is-open", !isOpen);
          btn.querySelector("span").textContent = isOpen ? "解説を読む" : "解説を閉じる";
        };

        if (!sessionRes) {
          input.onchange = () => { if (input.checked) selected.add(i); else selected.delete(i); };
        }
        choicesEl.appendChild(node);
      }

      $("submitBtn").disabled = !!sessionRes;
      $("submitBtn").onclick = () => {
        if (sessionRes || selected.size === 0) return;
        const sel = uniqSorted(Array.from(selected));
        const correct = uniqSorted(q.correct || []);
        const isCorrect = arraysEqual(sel, correct);

        addLog({ t: Date.now(), id: String(q.id), category: String(q.category || ""), selected: sel, correct, isCorrect });
        SESSION_RESULTS.set(String(q.id), { selected: sel, isCorrect });
        renderQuestion(q);
      };

      // ナビゲーション制御
      let isFirst = false, isLast = false;
      let prevFn = null, nextFn = null;

      if (playList.length > 0) {
        // ランダム演習モード
        isFirst = playListIndex <= 0;
        isLast = playListIndex >= playList.length - 1;
        prevFn = () => { playListIndex--; setRoute(playList[playListIndex]); };
        
        if (isLast) {
          nextFn = () => { alert("演習お疲れ様でした！ダッシュボードに戻ります。"); setRoute(null, 'dashboard'); };
          $("nextBtn").textContent = "演習完了";
        } else {
          nextFn = () => { playListIndex++; setRoute(playList[playListIndex]); };
          $("nextBtn").textContent = "次の問題";
        }
      } else {
        // 通常モード
        const ids = QUESTIONS.map(x => String(x.id));
        const idx = ids.indexOf(String(q.id));
        isFirst = idx <= 0;
        isLast = idx < 0 || idx >= ids.length - 1;
        prevFn = () => setRoute(ids[idx - 1]);
        nextFn = () => setRoute(ids[idx + 1]);
        $("nextBtn").textContent = "次の問題";
      }

      $("prevBtn").disabled = isFirst;
      $("prevBtn").onclick = prevFn;
      $("nextBtn").onclick = nextFn;

      if (sessionRes) {
        resultEl.innerHTML = sessionRes.isCorrect 
          ? `<div class="result-banner ok">🎉 正解！</div>`
          : `<div class="result-banner ng">❌ 不正解</div>`;
      }
    }

    // --- Boot ---
    async function main() {
      const rawData = await loadQuestions();
      QUESTIONS = (Array.isArray(rawData) ? rawData : []).map(q => ({
        id: String(q.id || ""), category: String(q.category || ""), source: String(q.source || ""),
        question: String(q.question || ""),
        choices: Array.isArray(q.choices) ? q.choices : [],
        correct: Array.isArray(q.correct_indices) ? q.correct_indices : (Array.isArray(q.correct) ? q.correct : []),
      }));

      loadBookmarks();
      setupFilters();
      syncViewFromUrl();
    }

    main();
  </script>
</body>
</html>
