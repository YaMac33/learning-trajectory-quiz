<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Learning Trajectory Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --c-bg: #ffffff;
      --c-surface: #ffffff;
      --c-surface-hover: #f8fafc;
      --c-border: #e2e8f0;
      --c-text-main: #0f172a;
      --c-text-sub: #64748b;

      --c-primary: #3b82f6;
      --c-primary-hover: #2563eb;
      --c-primary-light: #eff6ff;

      --c-success: #10b981;
      --c-success-bg: #ecfdf5;
      --c-danger: #ef4444;
      --c-danger-bg: #fef2f2;
      --c-warning: #f59e0b;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;

      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);

      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', system-ui, -apple-system, sans-serif;
      background-color: var(--c-bg);
      color: var(--c-text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--c-border);
      flex-wrap: wrap;
      gap: 12px;
    }

    .topbar h1 {
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--c-primary);
      letter-spacing: -0.025em;
    }

    .nav-links { display: flex; gap: 8px; }
    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--c-text-sub);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      white-space: nowrap;
    }
    .nav-btn:hover { background: var(--c-surface-hover); color: var(--c-text-main); }
    .nav-btn.active { background: var(--c-primary-light); color: var(--c-primary); border-color: #bfdbfe; }

    #app { max-width: 900px; margin: 0 auto; padding: 28px 18px 80px; }
    [hidden] { display: none !important; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--c-text-sub);
      cursor: pointer;
      transition: var(--transition);
      user-select: none;
    }
    .chip:hover { background: var(--c-surface-hover); }
    .chip input { display: none; }
    .chip input:checked + span { color: var(--c-primary); font-weight: 900; }
    .chip:has(input:checked) { border-color: var(--c-primary); background: var(--c-primary-light); }

    .bookmark-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: #cbd5e1;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 50%;
    }
    .bookmark-btn:hover { background: #fef3c7; color: var(--c-warning); transform: scale(1.08); }
    .bookmark-btn.active { color: var(--c-warning); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 22px;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    .stat-card-title { font-size: 0.95rem; color: var(--c-text-sub); font-weight: 700; margin-bottom: 8px; }
    .stat-card-value { font-size: 2.5rem; font-weight: 900; color: var(--c-text-main); }
    .stat-card-sub { font-size: 0.85rem; color: var(--c-text-sub); margin-top: 4px; }

    .section-title {
      font-size: 1.25rem;
      font-weight: 900;
      margin: 0 0 18px;
      color: var(--c-text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cat-stat {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 12px;
    }
    .cat-stat-head { display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 8px; }
    .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-bottom: 6px; }
    .progress-fill { height: 100%; background: var(--c-primary); transition: width 0.5s ease-out; }
    .cat-stat-meta { font-size: 0.8rem; color: var(--c-text-sub); text-align: right; }

    .play-modes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .play-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: var(--c-surface);
      border: 2px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 18px;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 900;
      color: var(--c-text-main);
    }
    .play-btn:hover { border-color: var(--c-primary); background: var(--c-surface-hover); transform: translateY(-2px); }
    .play-btn-icon { font-size: 2rem; }

    .filters {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 18px;
      margin-bottom: 22px;
      box-shadow: var(--shadow-sm);
    }
    .filters-row { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 14px; }
    .filters-item { display: flex; flex-direction: column; gap: 6px; flex: 1 1 200px; }
    .filters-label { font-size: 0.85rem; font-weight: 700; color: var(--c-text-sub); }
    .filters-select, .filters-input {
      width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--c-border);
      font-family: inherit; font-size: 0.95rem; transition: var(--transition);
    }
    .filters-select:focus, .filters-input:focus { outline: none; border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

    .quiz-list { display: grid; gap: 14px; }
    .quiz-card {
      display: flex; flex-direction: column; gap: 10px; padding: 18px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius-md); text-align: left; cursor: pointer;
      transition: var(--transition); position: relative;
    }
    .quiz-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--c-primary); }
    .quiz-card-title { font-size: 1.05rem; font-weight: 600; line-height: 1.5; padding-right: 44px;}
    .quiz-card-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; font-size: 0.85rem; color: var(--c-text-sub); }
    .quiz-card .bookmark-btn { position: absolute; top: 14px; right: 14px; }

    .quiz-card-submeta { font-size: 0.8rem; color: var(--c-text-sub); display: flex; gap: 10px; flex-wrap: wrap; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--c-border); background: #fff; }
    .pill strong { font-weight: 900; }

    .badge { padding: 4px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; }
    .badge-gray { background: #f1f5f9; color: #475569; }
    .badge-green { background: var(--c-success-bg); color: var(--c-success); }
    .badge-red { background: var(--c-danger-bg); color: var(--c-danger); }

    .playlist-banner {
      background: var(--c-primary);
      color: white;
      text-align: center;
      padding: 8px;
      border-radius: var(--radius-sm);
      font-weight: 900;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }

    .question-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .question-meta-tags { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.9rem; color: var(--c-text-sub); }
    .question-meta-tags > div { display: flex; align-items: center; gap: 6px; }
    .question-meta-tags svg { opacity: .9; }

    .question-box {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 26px;
      margin-bottom: 18px;
      box-shadow: var(--shadow-sm);
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.7;
    }

    .choices { display: flex; flex-direction: column; gap: 14px; }
    .choice { background: var(--c-surface); border: 2px solid var(--c-border); border-radius: var(--radius-md); transition: var(--transition); overflow: hidden; }
    .choice:hover:not(.disabled) { border-color: var(--c-primary); background: var(--c-surface-hover); }
    .choice-main { display: flex; align-items: flex-start; gap: 14px; padding: 18px; cursor: pointer; }
    .choice.disabled .choice-main { cursor: default; }

    .choice-input-wrapper {
      flex-shrink: 0; width: 24px; height: 24px; border: 2px solid var(--c-border); border-radius: 6px;
      display: flex; align-items: center; justify-content: center; transition: var(--transition); margin-top: 2px;
    }
    .choice-input { display: none; }
    .choice-input:checked + .choice-input-wrapper { background: var(--c-primary); border-color: var(--c-primary); }
    .choice-input:checked + .choice-input-wrapper::after { content: ""; width: 10px; height: 10px; background: white; border-radius: 2px; }
    .choice:has(.choice-input:checked) { border-color: var(--c-primary); background: var(--c-primary-light); }

    .choice-text { font-size: 1rem; line-height: 1.5; padding-top: 2px; }

    .choice.is-correct { border-color: var(--c-success); background: var(--c-success-bg); }
    .choice.is-correct .choice-input-wrapper { background: var(--c-success); border-color: var(--c-success); }
    .choice.is-wrong { border-color: var(--c-danger); background: var(--c-danger-bg); }

    .choice-info { padding: 0 18px 18px 56px; }
    .choice-overview { font-weight: 900; margin-bottom: 10px; }
    .choice.is-correct .choice-overview { color: var(--c-success); }
    .choice.is-wrong .choice-overview { color: var(--c-danger); }

    .choice-toggle-detail {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: var(--c-text-sub);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      margin-left: -12px;
    }
    .choice-toggle-detail:hover:not(:disabled) { background: var(--c-surface-hover); color: var(--c-text-main); }
    .choice-toggle-detail.is-open svg { transform: rotate(180deg); }

    .choice-detail {
      margin-top: 10px;
      padding: 14px;
      background: rgba(0,0,0,0.03);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      border-left: 3px solid var(--c-primary);
    }
    .choice-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--c-primary);
      text-decoration: none;
      font-weight: 700;
    }
    .choice-link:hover { text-decoration: underline; }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 26px;
      padding-top: 18px;
      border-top: 1px solid var(--c-border);
      gap: 10px;
    }
    .btn-primary {
      background: var(--c-primary);
      color: #ffffff;
      border: none;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
      transition: var(--transition);
      flex: 1;
      min-width: 160px;
    }
    .btn-primary:hover:not(:disabled) { background: var(--c-primary-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.23); }
    .btn-secondary {
      background: #ffffff;
      color: var(--c-text-main);
      border: 1px solid var(--c-border);
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .btn-secondary:hover:not(:disabled) { background: var(--c-surface-hover); border-color: #cbd5e1; }
    .btn-danger { background: var(--c-danger-bg); color: var(--c-danger); border: 1px solid #fca5a5; padding: 10px 18px; border-radius: var(--radius-sm); font-weight: 800; cursor: pointer; transition: var(--transition); }
    .btn-danger:hover { background: #fee2e2; border-color: var(--c-danger); }
    button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none !important; }

    .result-banner {
      margin: 14px 0 10px;
      padding: 16px;
      border-radius: var(--radius-md);
      text-align: center;
      font-size: 1.15rem;
      font-weight: 900;
      animation: fadeIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .result-banner.ok { background: var(--c-success-bg); color: var(--c-success); border: 2px solid var(--c-success); }
    .result-banner.ng { background: var(--c-danger-bg); color: var(--c-danger); border: 2px solid var(--c-danger); }

    .empty {
      text-align: center;
      padding: 34px;
      color: var(--c-text-sub);
      background: var(--c-surface-hover);
      border-radius: var(--radius-md);
      border: 1px dashed var(--c-border);
    }

    .muted { color: var(--c-text-sub); }
  </style>
</head>

<body>
  <header class="topbar">
    <h1>LT Quiz</h1>
    <nav class="nav-links">
      <button id="navDashboard" class="nav-btn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px; margin-top: -2px;">
          <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        成績・演習
      </button>
      <button id="navList" class="nav-btn active" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px; margin-top: -2px;">
          <line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
        問題一覧
      </button>
    </nav>
  </header>

  <main id="app">
    <div id="status" style="text-align: center; margin-bottom: 16px; color: #64748b; font-weight: 700;"></div>

    <!-- ================= DASHBOARD VIEW ================= -->
    <section id="view-dashboard" class="fade-in" hidden>
      <h2 class="section-title">学習ダッシュボード</h2>

      <div class="dashboard-grid">
        <div class="stat-card">
          <div class="stat-card-title">全体の正答率（最新結果）</div>
          <div id="db-accuracy" class="stat-card-value">0%</div>
          <div id="db-correct-count" class="stat-card-sub">正解 0 / 回答 0</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title">学習の進捗度</div>
          <div id="db-progress" class="stat-card-value">0%</div>
          <div id="db-answered-count" class="stat-card-sub">回答 0 / 全 0 問</div>
        </div>
      </div>

      <h2 class="section-title">ランダム演習モード</h2>
      <div class="play-modes">
        <button class="play-btn" type="button" id="playUnanswered">
          <div class="play-btn-icon">🆕</div>
          未回答から10問
        </button>
        <button class="play-btn" type="button" id="playWeak">
          <div class="play-btn-icon">🔥</div>
          不正解から10問
        </button>
        <button class="play-btn" type="button" id="playBookmark">
          <div class="play-btn-icon">⭐</div>
          お気に入りから10問
        </button>
      </div>

      <h2 class="section-title">カテゴリ別 正答率（親カテゴリ）</h2>
      <div id="db-cat-stats" style="margin-bottom: 26px;"></div>

      <h2 class="section-title">設定</h2>
      <div style="background: var(--c-danger-bg); padding: 18px; border-radius: var(--radius-md); border: 1px solid #fca5a5;">
        <p style="margin-bottom: 10px; font-weight: 700; color: var(--c-danger);">端末に保存されている学習履歴とお気に入りをすべて初期化します。</p>
        <button class="btn-danger" type="button" id="resetBtn">学習データをリセット</button>
      </div>
    </section>

    <!-- ================= LIST VIEW ================= -->
    <section id="view-list" class="fade-in">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px;">
        <h2 class="section-title" style="margin: 0;">問題一覧</h2>
        <p style="font-size: 0.85rem; color: var(--c-text-sub); font-weight: 700;">クリックして問題に挑戦</p>
      </div>

      <section class="filters" aria-label="フィルタ">
        <div class="filters-row">
          <label class="filters-item">
            <span class="filters-label">親カテゴリ</span>
            <select id="parentFilter" class="filters-select"><option value="">すべて</option></select>
          </label>

          <label class="filters-item">
            <span class="filters-label">表示・並び順</span>
            <select id="groupMode" class="filters-select">
              <option value="cat-parent">カテゴリ別に表示</option>
              <option value="source-session">出題年度・問題順に表示</option>
            </select>
          </label>

          <label class="filters-item" style="flex: 2 1 320px;">
            <span class="filters-label">キーワード検索</span>
            <input id="searchInput" class="filters-input" type="search" placeholder="問題文 / ID / 出典で検索" />
          </label>
        </div>

        <div class="filters-row" style="margin-top: 10px; gap: 12px;">
          <label class="chip"><input id="onlyUnanswered" type="checkbox" /><span>未回答のみ</span></label>
          <label class="chip"><input id="onlyIncorrect" type="checkbox" /><span>不正解のみ</span></label>
          <label class="chip"><input id="onlyBookmark" type="checkbox" /><span>お気に入り(★)</span></label>
        </div>
      </section>

      <div id="quizList" class="quiz-list"></div>
    </section>

    <!-- ================= QUIZ VIEW ================= -->
    <section id="view-quiz" class="fade-in" hidden>
      <div id="playlistBanner" class="playlist-banner" hidden>
        ランダム演習モード: <span id="playlistProgress"></span>
      </div>

      <div class="question-meta">
        <div class="question-meta-tags">
          <div id="qid" title="問題ID">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18"/></svg>
            <span></span>
          </div>
          <div id="qcategory" title="カテゴリ">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <span></span>
          </div>
          <div id="qsource" title="出典">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            <span></span>
          </div>
        </div>
        <button id="quizBookmarkBtn" class="bookmark-btn" title="お気に入りに追加" type="button">★</button>
      </div>

      <div id="question" class="question-box"></div>
      <div id="result"></div>
      <div id="choices" class="choices"></div>

      <template id="choice-template">
        <div class="choice">
          <label class="choice-main">
            <input type="checkbox" class="choice-input" />
            <div class="choice-input-wrapper"></div>
            <span class="choice-text"></span>
          </label>

          <div class="choice-info" hidden>
            <div class="choice-overview" hidden></div>

            <button type="button" class="choice-toggle-detail" disabled>
              <span>解説を閉じる</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </button>

            <div class="choice-detail" hidden>
              <div class="choice-detail-content"></div>
              <a href="" class="choice-link" target="_blank" rel="noopener noreferrer">参考リンクを開く</a>
            </div>
          </div>
        </div>
      </template>

      <div class="actions">
        <button id="prevBtn" type="button" class="btn-secondary">前の問題</button>
        <button id="submitBtn" type="button" class="btn-primary">回答を決定する</button>
        <button id="nextBtn" type="button" class="btn-secondary">次の問題</button>
      </div>
    </section>
  </main>

  <script>
    // =========================
    // Config / Storage
    // =========================
    const LOG_KEY = "ltQuizLogs_v3";
    const BOOKMARK_KEY = "ltQuizBookmarks_v1";

    // ランダム演習
    let playList = [];
    let playListIndex = -1;

    // セッション内の回答結果（ページ再読み込みまでは保持）
    const SESSION_RESULTS = new Map();
    let bookmarks = new Set();

    // =========================
    // DOM helper
    // =========================
    const $ = (id) => document.getElementById(id);

    // =========================
    // Utils
    // =========================
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));
    }
    function uniqSorted(arr) { return Array.from(new Set(arr)).sort((a, b) => a - b); }
    function arraysEqual(a, b) { return a.length === b.length && a.every((v, i) => v === b[i]); }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function splitCategoryFromTaxonomy(q) {
      const p = String(q?.taxonomy?.parent || "").trim() || "未分類";
      const c = String(q?.taxonomy?.child || "").trim() || "未分類";
      return { parent: p, child: c, full: `${p} / ${c}` };
    }

    function sourceLabel(q) {
      const s = String(q?.source?.label || "").trim();
      return s || "";
    }

    function sessionKeyFromSourceLabel(label) {
      // "令和6年春期　問40" → "令和6年春期"
      const s = String(label || "").trim();
      if (!s) return "不明";
      const m = s.match(/^(.*?)(?:\s*問\s*\d+)?\s*$/);
      const head = (m && m[1]) ? m[1].trim() : s;
      return head.replace(/\s*問\s*$/,"").trim() || "不明";
    }

    // --- ソート用パーサー ---
    function parseSourceLabel(label) {
      const s = String(label || "").trim();
      let year = 0, term = 0, qNum = 9999;
      // 例: "令和6年秋期 問19", "平成31年春期"
      const m = s.match(/(令和|平成|昭和)?(?:(\d+|元)年)?(春期|秋期|春|秋)?\s*(?:問\s*(\d+))?/);
      if (m && (m[1] || m[2] || s.match(/(\d{4})年/))) {
        const gengou = m[1], nen = m[2], season = m[3], num = m[4];
        if (gengou && nen) {
          let y = nen === "元" ? 1 : parseInt(nen, 10);
          if (gengou === "令和") year = 2018 + y;
          else if (gengou === "平成") year = 1988 + y;
          else if (gengou === "昭和") year = 1925 + y;
        } else {
          const ym = s.match(/(\d{4})年/);
          if (ym) year = parseInt(ym[1], 10);
        }
        if (season) {
          if (season.includes("秋")) term = 2;
          else if (season.includes("春")) term = 1;
        }
        if (num) qNum = parseInt(num, 10);
      }
      return { year, term, qNum };
    }

    function compareSourceGroup(aStr, bStr) {
      const a = parseSourceLabel(aStr);
      const b = parseSourceLabel(bStr);
      if (a.year !== b.year) return b.year - a.year; // 新しい年度が上
      if (a.term !== b.term) return b.term - a.term; // 秋期が春期より上
      return aStr.localeCompare(bStr, "ja");
    }

    function compareQuestionOrder(a, b) {
      const pa = parseSourceLabel(a._sourceLabel);
      const pb = parseSourceLabel(b._sourceLabel);
      if (pa.qNum !== pb.qNum) return pa.qNum - pb.qNum; // 問1, 問2...の順
      return a.id.localeCompare(b.id, "ja");
    }

    // =========================
    // Storage (logs / bookmarks)
    // =========================
    function loadLogs() {
      try {
        const s = localStorage.getItem(LOG_KEY);
        const arr = s ? JSON.parse(s) : [];
        return Array.isArray(arr) ? arr : [];
      } catch { return []; }
    }
    function saveLogs(logs) {
      localStorage.setItem(LOG_KEY, JSON.stringify(logs));
    }
    function addLog(entry) {
      const logs = loadLogs();
      logs.push(entry);
      if (logs.length > 5000) logs.splice(0, logs.length - 5000);
      saveLogs(logs);
    }
    function latestResultById(logs) {
      const m = new Map();
      for (const e of logs) {
        if (!e || !e.id) continue;
        const prev = m.get(e.id);
        if (!prev || (typeof e.t === "number" && e.t > prev.t)) m.set(e.id, e);
      }
      return m;
    }

    function loadBookmarks() {
      try {
        bookmarks = new Set(JSON.parse(localStorage.getItem(BOOKMARK_KEY) || "[]"));
      } catch {
        bookmarks = new Set();
      }
    }
    function persistBookmarks() {
      localStorage.setItem(BOOKMARK_KEY, JSON.stringify([...bookmarks]));
    }
    function toggleBookmark(id) {
      const key = String(id);
      if (bookmarks.has(key)) bookmarks.delete(key);
      else bookmarks.add(key);
      persistBookmarks();
      renderList();
    }

    // =========================
    // Routing (URL params)
    // =========================
    function setRoute(id = null, view = null) {
      const url = new URL(window.location.href);
      url.searchParams.delete("id");
      url.searchParams.delete("view");

      if (id) url.searchParams.set("id", String(id));
      else if (view) url.searchParams.set("view", String(view));

      history.pushState({}, "", url.toString());
      syncViewFromUrl();
    }
    function getQueryParam(name) { return new URL(window.location.href).searchParams.get(name); }

    function syncViewFromUrl() {
      const id = getQueryParam("id");
      const view = getQueryParam("view");

      $("view-list").hidden = true;
      $("view-quiz").hidden = true;
      $("view-dashboard").hidden = true;

      $("navList").classList.remove("active");
      $("navDashboard").classList.remove("active");

      if (id) {
        $("view-quiz").hidden = false;
        $("navList").classList.remove("active");
        $("navDashboard").classList.remove("active");
        const q = QUESTIONS.find(x => String(x.id) === String(id));
        if (q) renderQuestion(q);
        else $("question").textContent = "問題が見つかりません。";
        window.scrollTo(0, 0);
        return;
      }

      if (view === "dashboard") {
        $("view-dashboard").hidden = false;
        $("navDashboard").classList.add("active");
        playList = []; // reset
        renderDashboard();
        window.scrollTo(0, 0);
        return;
      }

      $("view-list").hidden = false;
      $("navList").classList.add("active");
      playList = []; // reset
      renderList();
      window.scrollTo(0, 0);
    }

    window.addEventListener("popstate", syncViewFromUrl);

    // =========================
    // Data loading
    // =========================
    let QUESTIONS = [];

    async function loadQuestions() {
      const res = await fetch("./questions.json", { cache: "no-cache", headers: { Accept: "application/json" } });
      if (!res.ok) throw new Error(`questions.json fetch failed (${res.status})`);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error("questions.json is not an array");
      return data;
    }

    function normalizeQuestions(raw) {
      return raw.map(q => {
        const id = String(q.id || "").trim();
        const question = String(q.question || "").trim();
        const choices = Array.isArray(q.choices) ? q.choices.map(c => ({
          text: String(c?.text || ""),
          overview: String(c?.overview || ""),
          detail: String(c?.detail || ""),
          link: String(c?.link || "")
        })) : [];
        const correct = Array.isArray(q.correct_indices) ? q.correct_indices.map(n => Number(n)).filter(Number.isFinite)
                      : Array.isArray(q.correct) ? q.correct.map(n => Number(n)).filter(Number.isFinite)
                      : [];
        const { parent, child, full } = splitCategoryFromTaxonomy(q);
        const srcLabel = sourceLabel(q);

        return {
          id, question, choices,
          correct_indices: correct,
          taxonomy: { parent, child, path: [parent, child] },
          source: { label: srcLabel },
          _catFull: full,
          _sourceLabel: srcLabel
        };
      }).filter(q => q.id && q.question && q.choices.length >= 4);
    }

    // =========================
    // Filters UI
    // =========================
    function setupFilters() {
      const pSel = $("parentFilter");
      const parents = Array.from(new Set(QUESTIONS.map(q => q.taxonomy.parent))).sort((a,b)=>a.localeCompare(b,"ja"));
      pSel.innerHTML = `<option value="">すべて</option>` + parents.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join("");

      pSel.onchange = renderList;
      $("groupMode").onchange = renderList;
      $("searchInput").addEventListener("input", renderList);
      $("onlyUnanswered").addEventListener("change", renderList);
      $("onlyIncorrect").addEventListener("change", renderList);
      $("onlyBookmark").addEventListener("change", renderList);
    }

    // =========================
    // Dashboard
    // =========================
    function renderDashboard() {
      const logs = loadLogs();
      const latest = latestResultById(logs);

      const totalQ = QUESTIONS.length;
      const answeredQ = latest.size;
      const correctQ = [...latest.values()].filter(r => r.isCorrect).length;

      const acc = answeredQ > 0 ? Math.round((correctQ / answeredQ) * 100) : 0;
      const prog = totalQ > 0 ? Math.round((answeredQ / totalQ) * 100) : 0;

      $("db-accuracy").textContent = `${acc}%`;
      $("db-correct-count").textContent = `正解 ${correctQ} / 回答 ${answeredQ}`;
      $("db-progress").textContent = `${prog}%`;
      $("db-answered-count").textContent = `回答 ${answeredQ} / 全 ${totalQ} 問`;

      const catStats = new Map();
      for (const q of QUESTIONS) {
        const p = q.taxonomy.parent;
        if (!catStats.has(p)) catStats.set(p, { total: 0, answered: 0, correct: 0 });
        const st = catStats.get(p);
        st.total++;
        const r = latest.get(q.id);
        if (r) {
          st.answered++;
          if (r.isCorrect) st.correct++;
        }
      }

      const html = Array.from(catStats.entries())
        .sort((a,b)=>b[1].total - a[1].total)
        .map(([p, st]) => {
          const a = st.answered > 0 ? Math.round((st.correct / st.answered) * 100) : 0;
          return `
            <div class="cat-stat">
              <div class="cat-stat-head"><span>${escapeHtml(p)}</span> <span>${a}%</span></div>
              <div class="progress-bar"><div class="progress-fill" style="width:${a}%"></div></div>
              <div class="cat-stat-meta">${st.answered} / ${st.total} 問 完了</div>
            </div>
          `;
        }).join("");

      $("db-cat-stats").innerHTML = html || `<p class="muted">データがありません</p>`;
    }

    function resetData() {
      if (!confirm("本当に学習履歴とお気に入りをすべて削除しますか？\nこの操作は元に戻せません。")) return;
      localStorage.removeItem(LOG_KEY);
      localStorage.removeItem(BOOKMARK_KEY);
      bookmarks.clear();
      SESSION_RESULTS.clear();
      alert("データをリセットしました。");
      renderDashboard();
      renderList();
    }

    // =========================
    // Random play
    // =========================
    function startRandomPlay(mode) {
      const logs = loadLogs();
      const latest = latestResultById(logs);

      let targetIds = [];
      if (mode === "unanswered") {
        targetIds = QUESTIONS.filter(q => !latest.has(q.id)).map(q => q.id);
      } else if (mode === "weak") {
        targetIds = QUESTIONS.filter(q => latest.has(q.id) && !latest.get(q.id).isCorrect).map(q => q.id);
      } else if (mode === "bookmark") {
        targetIds = [...bookmarks];
      }

      if (targetIds.length === 0) {
        alert("条件に一致する問題がありませんでした。");
        return;
      }

      playList = shuffle(targetIds).slice(0, 10);
      playListIndex = 0;
      setRoute(playList[0]);
    }

    // =========================
    // List
    // =========================
    function renderList() {
      const logs = loadLogs();
      const latest = latestResultById(logs);

      const listEl = $("quizList");
      listEl.innerHTML = "";

      const qSearch = String($("searchInput").value || "").trim().toLowerCase();
      const mode = String($("groupMode").value || "cat-parent");
      const parent = String($("parentFilter").value || "").trim();

      const onlyU = !!$("onlyUnanswered").checked;
      const onlyI = !!$("onlyIncorrect").checked;
      const onlyB = !!$("onlyBookmark").checked;

      const filtered = QUESTIONS.filter(q => {
        if (mode === "cat-parent" && parent && q.taxonomy.parent !== parent) return false;
        if (qSearch) {
          const hay = `${q.id} ${q.question} ${q._sourceLabel}`.toLowerCase();
          if (!hay.includes(qSearch)) return false;
        }

        const r = latest.get(q.id);
        if (onlyU && r) return false;
        if (onlyI && (!r || r.isCorrect)) return false;
        if (onlyB && !bookmarks.has(q.id)) return false;

        return true;
      });

      if (filtered.length === 0) {
        listEl.innerHTML = `<div class="empty">条件に一致する問題がありません。</div>`;
        return;
      }

      // group
      const groups = new Map();
      for (const q of filtered) {
        let key = "";
        if (mode === "cat-parent") key = q.taxonomy.parent;
        else key = sessionKeyFromSourceLabel(q._sourceLabel);

        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(q);
      }

      let groupKeys = Array.from(groups.keys());
      if (mode === "source-session") {
        groupKeys.sort(compareSourceGroup); // 出題年度（新しい順）
      } else {
        groupKeys.sort((a,b)=>a.localeCompare(b,"ja")); // カテゴリ（文字順）
      }

      let seq = 0;
      for (const key of groupKeys) {
        const arr = groups.get(key) || [];
        
        // グループ内ソート
        if (mode === "source-session") {
          arr.sort(compareQuestionOrder); // 問題順（1, 2, 3...順）
        } else {
          arr.sort((a,b) => (a.taxonomy.child + a.id).localeCompare(b.taxonomy.child + b.id, "ja"));
        }

        const sec = document.createElement("section");
        sec.innerHTML = `
          <h3 class="section-title" style="margin-top:22px; font-size:1.1rem">
            ${escapeHtml(key)}
            <span style="font-size:0.9rem; color:var(--c-text-sub); font-weight:800">（${arr.length}問）</span>
          </h3>
        `;

        const grid = document.createElement("div");
        grid.className = "quiz-list";

        for (const q of arr) {
          seq++;
          const r = latest.get(q.id);
          const badge = !r
            ? `<span class="badge badge-gray">未回答</span>`
            : (r.isCorrect ? `<span class="badge badge-green">正解</span>` : `<span class="badge badge-red">不正解</span>`);

          const starClass = bookmarks.has(q.id) ? "active" : "";

          const card = document.createElement("div");
          card.className = "quiz-card fade-in";
          card.style.animationDelay = `${Math.min(seq * 0.015, 0.25)}s`;

          const src = q._sourceLabel ? `<span class="pill"><strong>出典</strong> ${escapeHtml(q._sourceLabel)}</span>` : "";
          const cat = `<span class="pill"><strong>分類</strong> ${escapeHtml(q._catFull)}</span>`;

          card.innerHTML = `
            <div class="quiz-card-title">${escapeHtml(q.question)}</div>
            <div class="quiz-card-meta">
              ${badge}
              <span class="meta-id">ID: ${escapeHtml(q.id)}</span>
            </div>
            <div class="quiz-card-submeta">
              ${cat}
              ${src}
            </div>
            <button class="bookmark-btn ${starClass}" type="button" title="お気に入り"
              onclick="event.stopPropagation(); window.__toggleBookmark('${escapeHtml(q.id)}')">★</button>
          `;
          card.onclick = () => setRoute(q.id);
          grid.appendChild(card);
        }

        sec.appendChild(grid);
        listEl.appendChild(sec);
      }
    }

    // =========================
    // Quiz
    // =========================
    function openExplanationUIForChoice(choiceEl, open) {
      const info = choiceEl.querySelector(".choice-info");
      const ov = choiceEl.querySelector(".choice-overview");
      const dt = choiceEl.querySelector(".choice-detail");
      const btn = choiceEl.querySelector(".choice-toggle-detail");
      const span = btn ? btn.querySelector("span") : null;

      if (!info || !ov || !dt || !btn) return;

      info.hidden = false;
      ov.hidden = !open;
      dt.hidden = !open;
      btn.disabled = false;
      btn.classList.toggle("is-open", open);
      if (span) span.textContent = open ? "解説を閉じる" : "解説を開く";
    }

    function renderQuestion(q) {
      const banner = $("playlistBanner");
      if (playList.length > 0) {
        banner.hidden = false;
        $("playlistProgress").textContent = `${playListIndex + 1} / ${playList.length} 問目`;
      } else {
        banner.hidden = true;
      }

      $("qid").querySelector("span").textContent = q.id;
      $("qcategory").querySelector("span").textContent = q._catFull;
      $("qsource").querySelector("span").textContent = q._sourceLabel || "不明";
      $("question").textContent = q.question;

      const bBtn = $("quizBookmarkBtn");
      bBtn.className = `bookmark-btn ${bookmarks.has(q.id) ? "active" : ""}`;
      bBtn.onclick = () => {
        toggleBookmark(q.id);
        bBtn.className = `bookmark-btn ${bookmarks.has(q.id) ? "active" : ""}`;
      };

      const resultEl = $("result");
      resultEl.innerHTML = "";

      const choicesEl = $("choices");
      choicesEl.innerHTML = "";
      const tpl = $("choice-template");

      const sessionRes = SESSION_RESULTS.get(String(q.id));
      const selected = new Set();

      for (let i = 0; i < q.choices.length; i++) {
        const c = q.choices[i];
        const node = tpl.content.firstElementChild.cloneNode(true);

        const input = node.querySelector(".choice-input");
        const text = node.querySelector(".choice-text");
        const info = node.querySelector(".choice-info");
        const ov = node.querySelector(".choice-overview");
        const dt = node.querySelector(".choice-detail");
        const dtContent = node.querySelector(".choice-detail-content");
        const link = node.querySelector(".choice-link");
        const btn = node.querySelector(".choice-toggle-detail");

        text.textContent = c.text || "";
        dtContent.textContent = c.detail || "";

        const href = String(c.link || "").trim();
        if (href) { link.href = href; link.hidden = false; }
        else { link.href = ""; link.hidden = true; }

        info.hidden = true;
        ov.hidden = true;
        dt.hidden = true;
        btn.disabled = true;
        btn.classList.remove("is-open");
        btn.querySelector("span").textContent = "解説を閉じる";

        input.disabled = !!sessionRes;

        if (sessionRes) {
          input.checked = sessionRes.selected.includes(i);
          node.classList.add("disabled");

          const correct = Array.isArray(q.correct_indices) ? q.correct_indices : [];
          if (correct.includes(i)) node.classList.add("is-correct");
          else if (input.checked) node.classList.add("is-wrong");

          if (c.overview) {
            ov.textContent = c.overview;
          } else {
            ov.textContent = "";
          }

          openExplanationUIForChoice(node, true);
        }

        btn.onclick = () => {
          if (!SESSION_RESULTS.get(String(q.id))) return;
          const open = ov.hidden && dt.hidden;
          openExplanationUIForChoice(node, open);
        };

        if (!sessionRes) {
          input.onchange = () => {
            if (input.checked) selected.add(i);
            else selected.delete(i);
          };
        }

        choicesEl.appendChild(node);
      }

      const submitBtn = $("submitBtn");
      submitBtn.disabled = !!sessionRes;

      submitBtn.onclick = () => {
        if (SESSION_RESULTS.get(String(q.id))) return;
        if (selected.size === 0) return;

        const sel = uniqSorted(Array.from(selected));
        const correct = uniqSorted(Array.isArray(q.correct_indices) ? q.correct_indices : []);
        const isCorrect = arraysEqual(sel, correct);

        addLog({
          t: Date.now(),
          id: String(q.id),
          category: q._catFull,
          selected: sel,
          correct: correct,
          isCorrect: isCorrect
        });

        SESSION_RESULTS.set(String(q.id), { selected: sel, isCorrect });
        renderQuestion(q);
      };

      let isFirst = false, isLast = false;
      let prevFn = null, nextFn = null;

      if (playList.length > 0) {
        isFirst = playListIndex <= 0;
        isLast = playListIndex >= playList.length - 1;

        prevFn = () => { playListIndex--; setRoute(playList[playListIndex]); };

        if (isLast) {
          nextFn = () => { alert("演習お疲れ様でした！ダッシュボードに戻ります。"); setRoute(null, "dashboard"); };
          $("nextBtn").textContent = "演習完了";
        } else {
          nextFn = () => { playListIndex++; setRoute(playList[playListIndex]); };
          $("nextBtn").textContent = "次の問題";
        }
      } else {
        const ids = QUESTIONS.map(x => String(x.id));
        const idx = ids.indexOf(String(q.id));
        isFirst = idx <= 0;
        isLast = (idx < 0) || (idx >= ids.length - 1);
        prevFn = () => setRoute(ids[idx - 1]);
        nextFn = () => setRoute(ids[idx + 1]);
        $("nextBtn").textContent = "次の問題";
      }

      $("prevBtn").disabled = isFirst;
      $("prevBtn").onclick = prevFn;
      $("nextBtn").disabled = isLast && playList.length === 0;
      $("nextBtn").onclick = nextFn;

      const sr = SESSION_RESULTS.get(String(q.id));
      if (sr) {
        resultEl.innerHTML = sr.isCorrect
          ? `<div class="result-banner ok">🎉 正解！</div>`
          : `<div class="result-banner ng">❌ 不正解</div>`;
      }
    }

    // =========================
    // Boot
    // =========================
    window.__toggleBookmark = (id) => toggleBookmark(id);

    async function main() {
      const statusEl = $("status");
      statusEl.textContent = "Loading...";

      try {
        const raw = await loadQuestions();
        QUESTIONS = normalizeQuestions(raw);

        loadBookmarks();
        setupFilters();

        $("navDashboard").onclick = () => setRoute(null, "dashboard");
        $("navList").onclick = () => setRoute(null, "list");

        $("playUnanswered").onclick = () => startRandomPlay("unanswered");
        $("playWeak").onclick = () => startRandomPlay("weak");
        $("playBookmark").onclick = () => startRandomPlay("bookmark");

        $("resetBtn").onclick = resetData;

        statusEl.textContent = "";
        syncViewFromUrl();
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Failed to load data: " + (err?.message || String(err));
        statusEl.style.color = "red";
      }
    }

    main();
  </script>
</body>
</html>
